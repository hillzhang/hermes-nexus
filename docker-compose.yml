version: '3.8'

services:
  hermes-nexus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes-nexus
    ports:
      - "3001:3000"
    volumes:
      # Mount host configuration directory to the container
      # Please ensure the left path matches your local ~/.hermes directory
      - ~/.hermes:/data
    environment:
      # Instruct the UI to access the mounted config path inside the container
      - HERMES_CONFIG_PATH=/data/config.yaml
      - NODE_ENV=production
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: hermes-network
